version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: billing-postgres
    environment:
      POSTGRES_DB: billingdb
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing123
    ports:
      - "5432:5432"
    volumes:
      - billing-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing -d billingdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  billing-service:
    build: .
    container_name: billing-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/billingdb
      SPRING_DATASOURCE_USERNAME: billing
      SPRING_DATASOURCE_PASSWORD: billing123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  billing-pgdata:
