# Test datasource - overridden dynamically by Testcontainers @DynamicPropertySource
spring.datasource.url=jdbc:postgresql://localhost:5432/billingdb
spring.datasource.username=billing
spring.datasource.password=billing123

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway must run to create schema before Hibernate validates
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
