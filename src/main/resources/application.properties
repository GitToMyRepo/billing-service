# Server
server.port=8080

# DataSource - matches docker-compose.yml service
spring.datasource.url=jdbc:postgresql://localhost:5432/billingdb
spring.datasource.username=billing
spring.datasource.password=billing123
spring.datasource.driver-class-name=org.postgresql.Driver

# Read replica datasource (points to same DB for local dev)
# In production this would point to a read replica host
spring.read-datasource.url=jdbc:postgresql://localhost:5432/billingdb
spring.read-datasource.username=billing
spring.read-datasource.password=billing123
spring.read-datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway - DB migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# App info
spring.application.name=billing-service

# Logging - include correlation ID in every log line via MDC
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId:-no-correlation-id}] %-5level %logger{36} - %msg%n

# Resilience4j - Circuit Breaker configuration for payment gateway
# Circuit breaker trips after 50% failure rate over last 10 calls
resilience4j.circuitbreaker.instances.paymentGateway.sliding-window-size=10
resilience4j.circuitbreaker.instances.paymentGateway.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentGateway.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.paymentGateway.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.paymentGateway.register-health-indicator=true

# Resilience4j - Retry configuration
# Retry up to 3 times with 500ms wait between attempts
resilience4j.retry.instances.paymentGateway.max-attempts=3
resilience4j.retry.instances.paymentGateway.wait-duration=500ms
